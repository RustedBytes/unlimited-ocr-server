threads = 0
exclude_paths = [
    "target",
    ".git",
    "node_modules",
]
ignore_findings = [
    # This project has a flat binary-crate module layout. Q0004 reports high
    # internal dependency count as "cycle risk", not concrete module cycles.
    "Q0004",
    # Transitive duplicate dependency versions are not actionable at this
    # crate's source level unless cargo-deny/audit flags a concrete problem.
    "Q0011",
    # Most public items in this binary crate are internal response/domain DTOs,
    # not a stable library API surface.
    "Q0002",
    # Local request/response carriers intentionally have fields without
    # behavior.
    "Q0016",
    # Normal Arc/RwLock/HashMap state shapes are noisy here; refactors should be
    # driven by ownership clarity, not nesting count.
    "Q0040",
    # Config is the resolved application settings carrier. Splitting it would
    # add access indirection across startup, API, queue, and worker code without
    # making invalid states more precise.
    "Q0026",
    # TaskPrompt mirrors Florence's finite public task vocabulary. The wide enum
    # is intentional so unsupported prompts remain unrepresentable internally.
    "Q0017",
    # Tiny helper inlining and short fluent crypto builders are style noise.
    "Q0066",
    "Q0037",
    # Metadata replay and worker tasks are low-frequency/process-owned flows;
    # these are not performance or lifecycle defects in this server.
    "Q0049",
    "Q0080",
    # required_text_input returns text_input, but Rust needs the explicit
    # lifetime because task_token is also borrowed.
    "Q0076",
    # qualirs reports repeated scoped writes as deadlock risk. The guards in
    # jobs.rs are dropped before awaited I/O or reacquired later.
    "Q0079",
    # False positives in jobs.rs: the reported lines use tokio::sync::RwLock,
    # not std::sync::Mutex in async code.
    "Q0083",
    # False positives in inference.rs: Option::as_mut() is safe Rust and there
    # are no unsafe blocks at the reported lines.
    "Q0090",
]
min_severity = "info"

[thresholds.arch]
god_module_loc = 1000
god_module_items = 20
public_api_ratio = 0.7
feature_concentration = 15
hidden_global_state = 3

[thresholds.design]
large_trait_methods = 15
excessive_generics = 5
deep_trait_bounds = 4
wide_hierarchy = 10
fat_impl_methods = 20
god_struct_fields = 20
primitive_obsession_fields = 4
data_clumps_args = 3
data_clumps_occurrences = 3
stringly_typed_fields = 3
large_error_enum_variants = 12

[thresholds.impl]
long_function_loc = 50
long_closure_loc = 25
deep_closure_nesting = 3
cyclomatic_complexity = 15
too_many_arguments = 6
deep_match_nesting = 3
deep_if_else = 4
excessive_unwrap = 3
large_enum_variants = 20
long_method_chain = 4
lifetime_explosion = 4
unsafe_block_overuse = 5
deeply_nested_type = 3
interior_mutability_abuse = 5

[thresholds.concurrency]
large_future_loc = 100
arc_mutex_overuse = 3

[thresholds.unsafe]
unsafe_without_comment = true

[policy]
skip_tests = true
test_path_markers = [
    "tests",
    "test",
    "tests.rs",
    "_tests.rs",
    "fuzz",
    "fuzz_targets",
]
skip_data_carrier_structs = true
skip_template_structs = true
data_carrier_struct_suffixes = [
    "Activity",
    "Command",
    "Config",
    "ConfigFile",
    "Descriptor",
    "Details",
    "Dto",
    "DTO",
    "Entry",
    "Event",
    "Failure",
    "Finding",
    "FormData",
    "Grant",
    "Hit",
    "Inspection",
    "Item",
    "Link",
    "Metrics",
    "Notification",
    "Options",
    "Outcome",
    "Overview",
    "Page",
    "Query",
    "Report",
    "Request",
    "Response",
    "Result",
    "Record",
    "Settings",
    "SettingsFile",
    "Session",
    "Snapshot",
    "Stats",
    "State",
    "Summary",
    "Template",
    "Variant",
    "View",
    "Vulnerability",
    "DeadLetter",
    "Health",
    "Metadata",
]
